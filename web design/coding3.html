<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar List</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      table,
      th,
      td {
        border: 1px solid black;
      }
      th,
      td {
        padding: 10px;
        text-align: left;
      }
      th {
        background-color: #f2f2f2;
      }
      caption {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <!-- Daftar Makanan dan Minuman Resto -->
    <table>
      <caption>
        Daftar Makanan dan Minuman
      </caption>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama</th>
          <th>Jenis</th>
          <th>Harga</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Nasi Goreng</td>
          <td>Makanan</td>
          <td>Rp 20.000</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Mie Ayam</td>
          <td>Makanan</td>
          <td>Rp 15.000</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Es Teh</td>
          <td>Minuman</td>
          <td>Rp 5.000</td>
        </tr>
        <tr>
          <td>4</td>
          <td>Es Jeruk</td>
          <td>Minuman</td>
          <td>Rp 8.000</td>
        </tr>
      </tbody>
    </table>

    <br />

    <!-- Daftar Online Shop -->
    <table>
      <caption>
        Daftar Online Shop
      </caption>
      <thead>
        <tr>
          <th>No</th>
          <th>Nama Toko</th>
          <th>Platform</th>
          <th>Rating</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>1</td>
          <td>Toko A</td>
          <td>Shopee</td>
          <td>4.8</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Toko B</td>
          <td>Tokopedia</td>
          <td>4.7</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Toko C</td>
          <td>Lazada</td>
          <td>4.6</td>
        </tr>
        <tr>
          <td>4</td>
          <td>Toko D</td>
          <td>Bukalapak</td>
          <td>4.5</td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
